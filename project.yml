name: BabyBloom
options:
  bundleIdPrefix: com.babybloom
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  SWIFT_VERSION: 6.0
  MARKETING_VERSION: 1.0.0
  CURRENT_PROJECT_VERSION: 1

targets:
  BabyBloom:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BabyBloom
        excludes:
          - "**/.DS_Store"
    resources:
      - path: BabyBloom/Resources/Assets.xcassets
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.babybloom.app
      INFOPLIST_FILE: BabyBloom/Resources/Info.plist
      DEVELOPMENT_TEAM: ""
      SWIFT_VERSION: 6.0
      TARGETED_DEVICE_FAMILY: "1,2"
      SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ENABLE_PREVIEW_CONTENT: YES
      CODE_SIGN_STYLE: Automatic
    capabilities:
      push-notifications: {}
      data-protection: {}
    dependencies:
      - target: BabyBloomWidget
        embed: true
    schemes:
      BabyBloom:
        build:
          targets:
            BabyBloom: all
        run:
          config: Debug
        test:
          config: Debug
          targets:
            - BabyBloomTests
        profile:
          config: Release
        analyze:
          config: Debug
        archive:
          config: Release

  BabyBloomWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BabyBloomWidget
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.babybloom.app.widget
      INFOPLIST_FILE: BabyBloomWidget/Info.plist
      SWIFT_VERSION: 6.0
      CODE_SIGN_STYLE: Automatic
    dependencies: []

  BabyBloomTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BabyBloomTests
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.babybloom.app.tests
      SWIFT_VERSION: 6.0
    dependencies:
      - target: BabyBloom
